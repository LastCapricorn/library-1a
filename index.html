<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="images/lc_logo_custom_duo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/icons.css">
  <link rel="stylesheet" href="css/style.css">
  <script defer src="js/script.js"></script>
  <title>Library 1A</title>
</head>
<body>
  <header>
    <div class="heading">
      <div class="logo"><span class="ph--books-duotone"></span></div>
      <div class="title">
        <h1>Library 1A</h1>
      </div>
    </div>
    <nav class="toolbar">
      <ul class="tools">
        <li role="button"><span class="ph--books-duotone"></span></li>
        <li role="button"><span class="ph--book-open-duotone"></span></li>
        <li role="button"><span class="ph--binoculars-duotone"></span></li>
        <li role="button"><span class="ph--sort-ascending-duotone"></span></li>
        <li role="button"><span class="ph--sort-descending-duotone"></span></li>
      </ul>
      <ul>
        <li role="button" class="scheme-toggle">
          <span class="ph--sun-duotone"></span>
          <span class="ph--moon-stars-duotone"></span>
        </li>
        <li role="button"><span class="ph--info-duotone"></span></li>
      </ul>
    </nav>
  </header>
  <main class="container">

  </main>
  <footer>
    <div>
      <span>&copy; 2026 LastCapricorn</span>
    </div>
  </footer>
  <template id="book-card-template">
    <div class="book-card">
      <p class="book-title"></p>
      <p class="book-author"></p>
      <p class="book-category"></p>
      <p class="book-year"></p>
      <p class="book-pages"></p>
      <p class="book-read"></p>
      <p class="book-rating"></p>
    </div>
  </template>
</body>
</html>
